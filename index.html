<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Studio - ADHD Friendly</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        modern: {
                            bg: '#0f0f13',      // Softer dark background (less eye strain)
                            surface: '#18181c', // Slightly lighter surface
                            card: '#202027',    // Card color
                            border: 'rgba(255, 255, 255, 0.08)',
                            hover: '#2a2a35'
                        }
                    },
                    animation: {
                        'fall': 'fall 2s ease-in-out forwards',
                    },
                    keyframes: {
                        fall: {
                            '0%': { transform: 'translateY(-20px) rotate(0deg)', opacity: 1 },
                            '100%': { transform: 'translateY(100vh) rotate(360deg)', opacity: 0 }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Thicker, friendlier scrollbars */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #3f3f4e; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background-color: #5a5a72; }
        
        .drag-over { background-color: rgba(255,255,255,0.05) !important; border: 2px dashed #60a5fa !important; }
        
        /* Bouncy micro-interactions */
        .row-hover { transition: background-color 0.2s ease, transform 0.2s ease; }
        .row-hover:hover .row-actions { opacity: 1; transform: translateX(0); }
        .row-actions { transform: translateX(5px); transition: all 0.2s ease; }
        
        .kanban-card { transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: grab; }
        .kanban-card:active { cursor: grabbing; transform: scale(0.98); }
        .kanban-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px -10px rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.2); border-width: 2px; margin: -1px; }

        /* Confetti piece styling */
        .confetti { position: fixed; width: 10px; height: 10px; z-index: 1000; pointer-events: none; }

        @media (max-width: 1024px) { .mobile-sidebar-hidden { transform: translateX(-100%); } }
    </style>
</head>
<body class="bg-modern-bg text-zinc-200 font-sans h-screen flex overflow-hidden selection:bg-indigo-500 selection:text-white text-[15px]">

    <!-- Mobile Header -->
    <div class="lg:hidden fixed top-0 left-0 right-0 h-16 bg-modern-surface border-b border-modern-border z-40 flex justify-between items-center px-5 shadow-md">
        <div class="flex items-center gap-2.5">
            <div class="bg-indigo-500 text-white p-1.5 rounded-lg"><i data-lucide="zap" class="w-4 h-4"></i></div>
            <span class="font-bold text-white tracking-tight text-lg">Creator<span class="text-indigo-400">Studio</span></span>
        </div>
        <button onclick="toggleMobileSidebar()" class="text-zinc-400 hover:text-white p-2 rounded-full hover:bg-modern-hover transition-colors">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
    </div>
    <div id="mobileOverlay" onclick="toggleMobileSidebar()" class="fixed inset-0 bg-black/80 z-30 hidden lg:hidden backdrop-blur-sm transition-opacity"></div>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="w-72 bg-modern-surface border-r border-modern-border flex flex-col fixed lg:static inset-y-0 left-0 z-40 transition-transform duration-300 mobile-sidebar-hidden lg:transform-none shadow-xl">
        
        <!-- Brand -->
        <div class="h-24 flex items-center gap-3 px-6 hidden lg:flex shrink-0 border-b border-modern-border">
            <div class="bg-indigo-500 text-white p-2.5 rounded-xl shadow-lg shadow-indigo-500/20">
                <i data-lucide="zap" class="w-6 h-6 fill-current"></i>
            </div>
            <span class="font-bold text-2xl tracking-tight text-white">Creator<span class="text-indigo-400 font-medium">Studio</span></span>
        </div>

        <div class="flex-1 overflow-y-auto py-6 px-4 flex flex-col gap-8">
            
            <!-- Views -->
            <div>
                <div class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest mb-3 px-2 flex items-center gap-2"><i data-lucide="eye" class="w-3 h-3"></i> Views</div>
                <ul class="space-y-1.5">
                    <li>
                        <button onclick="setView('kanban')" id="nav-view-kanban" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all font-semibold">
                            <i data-lucide="kanban-square" class="w-5 h-5"></i> Visual Board
                        </button>
                    </li>
                    <li>
                        <button onclick="setView('table')" id="nav-view-table" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all font-medium">
                            <i data-lucide="list" class="w-5 h-5"></i> Simple List
                        </button>
                    </li>
                </ul>
            </div>

            <!-- Pipeline -->
            <div>
                <div class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest mb-3 px-2 flex items-center gap-2"><i data-lucide="workflow" class="w-3 h-3"></i> Workflow</div>
                <ul class="space-y-1.5" id="navStatusList">
                    <!-- Populated by JS -->
                </ul>
            </div>

            <!-- Platforms -->
            <div>
                <div class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest mb-3 px-2 flex items-center gap-2"><i data-lucide="smartphone" class="w-3 h-3"></i> Platforms</div>
                <ul class="space-y-1.5" id="navPlatformList">
                    <!-- Populated by JS -->
                </ul>
            </div>

            <!-- Tags -->
            <div>
                <div class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest mb-3 px-2 flex items-center gap-2"><i data-lucide="tag" class="w-3 h-3"></i> Tags</div>
                <ul class="space-y-1.5" id="navTagList">
                    <!-- Populated by JS -->
                </ul>
            </div>
        </div>

        <!-- Bottom Actions -->
        <div class="p-4 grid grid-cols-2 gap-3 bg-modern-surface shrink-0 border-t border-modern-border">
            <button onclick="exportData()" class="flex items-center justify-center gap-2 px-3 py-3 text-sm font-semibold text-zinc-300 hover:text-white bg-modern-card hover:bg-modern-hover rounded-xl transition-all border border-modern-border shadow-sm hover:scale-105">
                <i data-lucide="download" class="w-4 h-4"></i> Export
            </button>
            <label class="flex items-center justify-center gap-2 px-3 py-3 text-sm font-semibold text-zinc-300 hover:text-white bg-modern-card hover:bg-modern-hover rounded-xl transition-all border border-modern-border shadow-sm cursor-pointer hover:scale-105">
                <i data-lucide="upload" class="w-4 h-4"></i> Import
                <input type="file" id="importFile" accept=".json" class="hidden" onchange="importData(event)">
            </label>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col min-w-0 bg-modern-bg mt-16 lg:mt-0 h-[calc(100vh-4rem)] lg:h-screen relative">
        
        <!-- Brain Dump Bar (Top Toolbar) -->
        <header class="p-6 lg:px-10 lg:py-6 bg-modern-surface/80 backdrop-blur-md border-b border-modern-border shrink-0 z-20 sticky top-0 flex flex-col md:flex-row items-start md:items-center gap-4 shadow-sm">
            
            <div class="flex-1 w-full relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i data-lucide="zap" class="h-5 w-5 text-indigo-400 group-focus-within:text-indigo-300 transition-colors"></i>
                </div>
                <input type="text" id="quickAddInput" onkeypress="handleQuickAdd(event)" class="block w-full pl-12 pr-4 py-3.5 border-2 border-modern-border hover:border-indigo-500/50 rounded-2xl bg-modern-card text-white placeholder-zinc-500 focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20 text-base font-medium transition-all shadow-inner" placeholder="Have an idea? Type it here and press Enter to save instantly...">
            </div>

            <div class="flex items-center gap-3 w-full md:w-auto shrink-0">
                <div class="relative w-full md:w-48 group">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="search" class="h-4 w-4 text-zinc-500"></i>
                    </div>
                    <input type="text" id="searchInput" onkeyup="renderApp()" class="block w-full pl-9 pr-3 py-3 border-2 border-modern-border rounded-xl bg-modern-card text-white placeholder-zinc-500 focus:outline-none focus:border-zinc-500 text-sm transition-all" placeholder="Search...">
                </div>
                
                <button onclick="openModal()" class="flex items-center justify-center gap-2 bg-indigo-500 text-white hover:bg-indigo-400 hover:-translate-y-1 px-5 py-3 rounded-xl text-sm font-bold transition-all shadow-lg shadow-indigo-500/25 w-full md:w-auto whitespace-nowrap">
                    <i data-lucide="plus" class="w-5 h-5"></i> <span>Detailed Idea</span>
                </button>
            </div>
        </header>

        <!-- Dynamic Content Container -->
        <div class="flex-1 overflow-hidden flex flex-col">
            <!-- Title Bar for active filter -->
            <div class="px-6 lg:px-10 pt-6 pb-2 shrink-0 flex justify-between items-center">
                <h1 class="text-2xl font-bold text-white tracking-tight flex items-center gap-3" id="currentFilterTitle">
                    All Ideas
                </h1>
                <select id="sortFilter" onchange="renderApp()" class="bg-modern-card border border-modern-border text-zinc-300 text-sm font-semibold rounded-lg focus:ring-indigo-500 focus:border-indigo-500 px-3 py-2 cursor-pointer outline-none shadow-sm">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="priority">By Priority</option>
                </select>
            </div>

            <div id="appContainer" class="flex-1 overflow-auto p-6 lg:p-10 pt-4 relative">
                <!-- Rendered by JS -->
            </div>
        </div>
    </main>

    <!-- Add/Edit Modal -->
    <div id="ideaModal" class="fixed inset-0 z-[60] hidden bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-modern-surface border-2 border-modern-border rounded-3xl w-full max-w-2xl shadow-2xl transform scale-95 transition-all duration-300 flex flex-col max-h-[90vh]" id="modalContent">
            
            <div class="flex justify-between items-center px-8 py-6 border-b border-modern-border shrink-0 bg-modern-card/50 rounded-t-3xl">
                <h3 class="text-xl font-bold text-white flex items-center gap-3" id="modalTitle">
                    <div class="bg-indigo-500 text-white p-2 rounded-xl"><i data-lucide="zap" class="w-5 h-5"></i></div> Idea Details
                </h3>
                <button onclick="closeModal()" class="text-zinc-400 hover:text-white hover:bg-red-500/20 hover:border-red-500/50 p-2 rounded-full transition-all border border-transparent">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <form id="ideaForm" onsubmit="saveIdea(event)" class="p-8 space-y-7 overflow-y-auto">
                <input type="hidden" id="ideaId">
                
                <div>
                    <label class="block text-sm font-bold text-zinc-400 mb-2">What's the core idea? <span class="text-indigo-400">*</span></label>
                    <input type="text" id="title" required class="w-full bg-modern-card border-2 border-modern-border rounded-2xl p-4 text-white focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all placeholder-zinc-600 text-lg font-bold shadow-inner" placeholder="e.g., The Ultimate Desk Setup 2026">
                </div>

                <div>
                    <label class="block text-sm font-bold text-zinc-400 mb-2">Bullet points / Notes (Dump your thoughts)</label>
                    <textarea id="description" rows="4" class="w-full bg-modern-card border-2 border-modern-border rounded-2xl p-4 text-white focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all placeholder-zinc-600 resize-none text-base shadow-inner leading-relaxed" placeholder="- Hook: Show messy desk first...&#10;- B-roll of new lights...&#10;- Call to action at the end..."></textarea>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-zinc-400">Action Priority</label>
                        <div class="flex gap-2">
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="priority" value="🔥 Urgent" class="peer sr-only">
                                <div class="text-center p-3 rounded-xl border-2 border-modern-border bg-modern-card peer-checked:border-red-500 peer-checked:bg-red-500/10 text-sm font-bold text-zinc-400 peer-checked:text-red-400 transition-all hover:border-zinc-600">
                                    🔥 Urgent
                                </div>
                            </label>
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="priority" value="⭐ Next" class="peer sr-only" checked>
                                <div class="text-center p-3 rounded-xl border-2 border-modern-border bg-modern-card peer-checked:border-yellow-500 peer-checked:bg-yellow-500/10 text-sm font-bold text-zinc-400 peer-checked:text-yellow-400 transition-all hover:border-zinc-600">
                                    ⭐ Next
                                </div>
                            </label>
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="priority" value="🧊 Whenever" class="peer sr-only">
                                <div class="text-center p-3 rounded-xl border-2 border-modern-border bg-modern-card peer-checked:border-blue-500 peer-checked:bg-blue-500/10 text-sm font-bold text-zinc-400 peer-checked:text-blue-400 transition-all hover:border-zinc-600">
                                    🧊 Whenever
                                </div>
                            </label>
                        </div>
                    </div>
                    
                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-zinc-400">Tags (comma separated)</label>
                        <input type="text" id="tags" class="w-full h-[52px] bg-modern-card border-2 border-modern-border rounded-xl px-4 text-white focus:border-indigo-500 outline-none transition-all placeholder-zinc-600 text-sm" placeholder="tech, review, setup">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 p-5 bg-modern-bg rounded-2xl border border-modern-border">
                    <div>
                        <label class="block text-sm font-bold text-zinc-400 mb-2">Platform</label>
                        <select id="platform" class="w-full bg-modern-card border-2 border-modern-border rounded-xl p-3 text-white focus:border-indigo-500 outline-none text-sm cursor-pointer font-medium">
                            <option value="YouTube">🔴 YouTube</option>
                            <option value="TikTok">🎵 TikTok</option>
                            <option value="Shorts">⚡ Shorts</option>
                            <option value="Reels">📸 Reels</option>
                            <option value="Other">🌐 Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-zinc-400 mb-2">Current Stage</label>
                        <select id="status" class="w-full bg-modern-card border-2 border-modern-border rounded-xl p-3 text-white focus:border-indigo-500 outline-none text-sm cursor-pointer font-medium">
                            <option value="Brain Dump 🧠">🧠 Brain Dump</option>
                            <option value="Scripting ✍️">✍️ Scripting</option>
                            <option value="Filming 🎥">🎥 Filming</option>
                            <option value="Editing ✂️">✂️ Editing</option>
                            <option value="Done 🎉">🎉 Done</option>
                        </select>
                    </div>
                </div>

                <div class="pt-4 flex justify-end gap-3 shrink-0">
                    <button type="button" onclick="closeModal()" class="px-6 py-3.5 rounded-xl text-sm font-bold text-zinc-400 hover:text-white hover:bg-modern-card transition-all">
                        Cancel
                    </button>
                    <button type="submit" class="px-8 py-3.5 rounded-xl text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-500 hover:-translate-y-1 transition-all shadow-lg shadow-indigo-600/30">
                        Save Idea
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 right-8 transform translate-y-24 opacity-0 transition-all duration-300 bg-modern-surface border-2 border-modern-border text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4 z-[70] pointer-events-none text-base font-bold backdrop-blur-md">
        <span id="toastIconWrapper" class="bg-indigo-500 text-white p-1.5 rounded-full"><i data-lucide="check" class="w-4 h-4"></i></span>
        <span id="toastMessage">Action successful</span>
    </div>

    <script>
        // --- State Management & Configuration ---
        const STORAGE_KEY = 'creator_studio_adhd';
        
        const STATUSES = ['Brain Dump 🧠', 'Scripting ✍️', 'Filming 🎥', 'Editing ✂️', 'Done 🎉'];
        const PLATFORMS = ['YouTube', 'TikTok', 'Shorts', 'Reels', 'Other'];

        // Map icons for clear visual cues
        const ICONS = {
            'Brain Dump 🧠': 'lightbulb', 'Scripting ✍️': 'pen-tool', 'Filming 🎥': 'video', 'Editing ✂️': 'scissors', 'Done 🎉': 'check-circle-2',
            'YouTube': 'youtube', 'TikTok': 'music-2', 'Shorts': 'zap', 'Reels': 'instagram', 'Other': 'monitor-play'
        };

        // Bright, distinct colors for status headers to aid quick scanning
        const STATUS_THEMES = {
            'Brain Dump 🧠': 'bg-blue-500/10 text-blue-400 border-blue-500/20',
            'Scripting ✍️': 'bg-purple-500/10 text-purple-400 border-purple-500/20',
            'Filming 🎥': 'bg-pink-500/10 text-pink-400 border-pink-500/20',
            'Editing ✂️': 'bg-orange-500/10 text-orange-400 border-orange-500/20',
            'Done 🎉': 'bg-emerald-500/10 text-emerald-400 border-emerald-500/30 ring-1 ring-emerald-500/50'
        };

        const PRIORITY_BADGES = {
            '🔥 Urgent': 'bg-red-500/20 text-red-400 border-red-500/30', 
            '⭐ Next': 'bg-yellow-500/20 text-yellow-400 border-yellow-500/30', 
            '🧊 Whenever': 'bg-zinc-500/20 text-zinc-400 border-zinc-500/30'
        };

        let defaultIdeas = [
            { id: '1', title: 'Ultimate Desk Setup 2026', description: '- New monitor\n- RGB lighting\n- Cable management tips', platform: 'YouTube', status: 'Scripting ✍️', priority: '🔥 Urgent', tags: ['tech', 'setup'], createdAt: new Date(Date.now() - 86400000).toISOString() },
            { id: '2', title: '3 Hidden iOS Features', description: 'Quick vertical video.', platform: 'TikTok', status: 'Brain Dump 🧠', priority: '⭐ Next', tags: ['apple', 'tips'], createdAt: new Date().toISOString() },
            { id: '3', title: 'Day in the Life Vlog', description: '', platform: 'YouTube', status: 'Filming 🎥', priority: '🔥 Urgent', tags: ['vlog'], createdAt: new Date().toISOString() },
            { id: '5', title: 'Quick lighting hack', description: 'Bounce lighting trick.', platform: 'Shorts', status: 'Done 🎉', priority: '🧊 Whenever', tags: ['lighting'], createdAt: new Date(Date.now() - 86400000 * 2).toISOString() },
        ];

        let ideas = [];
        
        // Load data, handling migration from older versions if necessary
        try {
            const savedIdeas = localStorage.getItem(STORAGE_KEY);
            if (savedIdeas) {
                ideas = JSON.parse(savedIdeas);
                // Simple migration map if old data exists
                ideas = ideas.map(i => {
                    if(i.status === 'Idea') i.status = 'Brain Dump 🧠';
                    if(i.status === 'Ready') i.status = 'Done 🎉';
                    if(i.priority === 'High') i.priority = '🔥 Urgent';
                    if(i.priority === 'Medium') i.priority = '⭐ Next';
                    if(i.priority === 'Low') i.priority = '🧊 Whenever';
                    if(!i.priority) i.priority = '⭐ Next';
                    return i;
                });
            } else {
                ideas = defaultIdeas;
                saveToLocalStorage();
            }
        } catch (e) {
            ideas = defaultIdeas;
        }

        function saveToLocalStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify(ideas)); }

        // ADHD Friendly Default: Kanban View
        let state = {
            view: 'kanban', 
            filterPlatform: 'All',
            filterStatus: 'All',
            activeTags: [] // Changed to an array to hold multiple tags
        };

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            renderSidebar();
            renderApp();
        });

        // --- Sidebar & Navigation Logic ---
        function renderSidebar() {
            const activeCls = 'w-full flex justify-between items-center px-4 py-3 text-sm rounded-xl transition-all bg-indigo-500 text-white font-bold shadow-md shadow-indigo-500/20';
            const inactiveCls = 'w-full flex justify-between items-center px-4 py-3 text-sm rounded-xl transition-all text-zinc-400 hover:bg-modern-hover hover:text-white font-semibold';
            const badgeActive = 'text-[11px] bg-white/20 text-white px-2 py-0.5 rounded-md font-bold';
            const badgeInactive = 'text-[11px] bg-modern-border text-zinc-400 px-2 py-0.5 rounded-md font-bold';

            // Status List
            const statusUl = document.getElementById('navStatusList');
            statusUl.innerHTML = `
                <li>
                    <button onclick="setFilter('status', 'All')" class="${state.filterStatus === 'All' ? activeCls : inactiveCls}">
                        <span class="flex items-center gap-3"><i data-lucide="layers" class="w-4 h-4"></i> All Stages</span>
                        <span class="${state.filterStatus === 'All' ? badgeActive : badgeInactive}">${ideas.length}</span>
                    </button>
                </li>
            ` + STATUSES.map(status => {
                const count = ideas.filter(i => i.status === status).length;
                const isActive = state.filterStatus === status;
                return `
                <li>
                    <button onclick="setFilter('status', '${status}')" class="${isActive ? activeCls : inactiveCls}">
                        <span class="flex items-center gap-3"><i data-lucide="${ICONS[status]}" class="w-4 h-4"></i> ${status.split(' ')[0]}</span>
                        ${count > 0 ? `<span class="${isActive ? badgeActive : badgeInactive}">${count}</span>` : ''}
                    </button>
                </li>`;
            }).join('');

            // Platform List
            const platformUl = document.getElementById('navPlatformList');
            platformUl.innerHTML = `
                <li>
                    <button onclick="setFilter('platform', 'All')" class="${state.filterPlatform === 'All' ? activeCls : inactiveCls}">
                        <span class="flex items-center gap-3"><i data-lucide="globe" class="w-4 h-4"></i> All Platforms</span>
                        <span class="${state.filterPlatform === 'All' ? badgeActive : badgeInactive}">${ideas.length}</span>
                    </button>
                </li>
            ` + PLATFORMS.map(plat => {
                const count = ideas.filter(i => i.platform === plat).length;
                const isActive = state.filterPlatform === plat;
                return `
                <li>
                    <button onclick="setFilter('platform', '${plat}')" class="${isActive ? activeCls : inactiveCls}">
                        <span class="flex items-center gap-3"><i data-lucide="${ICONS[plat]}" class="w-4 h-4"></i> ${plat}</span>
                        ${count > 0 ? `<span class="${isActive ? badgeActive : badgeInactive}">${count}</span>` : ''}
                    </button>
                </li>`;
            }).join('');

            // Tag List (Dynamically generated from current ideas)
            const allTags = [...new Set(ideas.flatMap(i => i.tags))].filter(t => t.trim() !== '').sort();
            const tagUl = document.getElementById('navTagList');
            const allTagsActive = state.activeTags.length === 0;
            
            tagUl.innerHTML = `
                <li>
                    <button onclick="toggleTagFilter('All')" class="${allTagsActive ? activeCls : inactiveCls}">
                        <span class="flex items-center gap-3"><i data-lucide="hash" class="w-4 h-4"></i> All Tags</span>
                        <span class="${allTagsActive ? badgeActive : badgeInactive}">${ideas.length}</span>
                    </button>
                </li>
            ` + allTags.map(tag => {
                const count = ideas.filter(i => i.tags.includes(tag)).length;
                const isActive = state.activeTags.includes(tag);
                return `
                <li>
                    <button onclick="toggleTagFilter('${tag}')" class="${isActive ? activeCls : inactiveCls}">
                        <span class="flex items-center gap-3 w-full truncate">
                            <i data-lucide="${isActive ? 'check-square' : 'square'}" class="w-4 h-4 shrink-0"></i> 
                            <span class="truncate">${tag}</span>
                        </span>
                        ${count > 0 ? `<span class="${isActive ? badgeActive : badgeInactive}">${count}</span>` : ''}
                    </button>
                </li>`;
            }).join('');

            // View Buttons
            document.getElementById('nav-view-table').className = state.view === 'table' ? activeCls : inactiveCls;
            document.getElementById('nav-view-kanban').className = state.view === 'kanban' ? activeCls : inactiveCls;

            // Update Header Title
            let titleParts = [];
            if (state.filterPlatform !== 'All') titleParts.push(state.filterPlatform);
            if (state.filterStatus !== 'All') titleParts.push(state.filterStatus);
            if (state.activeTags.length > 0) titleParts.push(state.activeTags.map(t => '#' + t).join(', '));
            document.getElementById('currentFilterTitle').innerHTML = titleParts.length > 0 ? titleParts.join(' <span class="text-zinc-600 mx-2">/</span> ') : "Everything";

            lucide.createIcons();
        }

        function setView(viewMode) {
            state.view = viewMode;
            renderSidebar();
            renderApp();
            if(window.innerWidth < 1024) toggleMobileSidebar();
        }

        function setFilter(type, value) {
            if (type === 'status') state.filterStatus = value;
            else if (type === 'platform') state.filterPlatform = value;
            renderSidebar();
            renderApp();
            if(window.innerWidth < 1024) toggleMobileSidebar();
        }

        function toggleTagFilter(tag) {
            if (tag === 'All') {
                state.activeTags = []; // Clear all tags
            } else {
                const index = state.activeTags.indexOf(tag);
                if (index > -1) {
                    state.activeTags.splice(index, 1); // Remove if already selected
                } else {
                    state.activeTags.push(tag); // Add if not selected
                }
            }
            renderSidebar();
            renderApp();
            // Note: We intentionally DO NOT close the mobile sidebar here
            // so you can easily tap multiple tags at once!
        }

        function toggleMobileSidebar() {
            const sb = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            sb.classList.toggle('mobile-sidebar-hidden');
            overlay.classList.toggle('hidden');
        }

        // --- Quick Add Function (Zero Friction) ---
        function handleQuickAdd(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('quickAddInput');
                const title = input.value.trim();
                if (title) {
                    // Instantly push to top of Brain Dump
                    ideas.unshift({
                        id: Date.now().toString(),
                        title: title,
                        description: '',
                        platform: 'YouTube', // Default
                        status: 'Brain Dump 🧠',
                        priority: '⭐ Next',
                        tags: [],
                        createdAt: new Date().toISOString()
                    });
                    input.value = '';
                    saveToLocalStorage();
                    renderSidebar();
                    renderApp();
                    showToast('Idea captured! 🧠');
                    input.blur(); // Drop focus
                }
            }
        }

        // --- Rendering Core ---
        function getFilteredIdeas() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const sort = document.getElementById('sortFilter').value;

            let filtered = ideas.filter(i => {
                const mSearch = i.title.toLowerCase().includes(search) || i.tags.some(t => t.toLowerCase().includes(search));
                const mStat = state.filterStatus === 'All' || i.status === state.filterStatus;
                const mPlat = state.filterPlatform === 'All' || i.platform === state.filterPlatform;
                
                // Show idea if it matches AT LEAST ONE of the selected tags (OR logic)
                const mTag = state.activeTags.length === 0 || state.activeTags.some(tag => i.tags.includes(tag));
                
                return mSearch && mStat && mPlat && mTag;
            });

            filtered.sort((a, b) => {
                if (sort === 'newest') return new Date(b.createdAt) - new Date(a.createdAt);
                if (sort === 'oldest') return new Date(a.createdAt) - new Date(b.createdAt);
                if (sort === 'priority') {
                    const val = { '🔥 Urgent': 3, '⭐ Next': 2, '🧊 Whenever': 1 };
                    return (val[b.priority] || 0) - (val[a.priority] || 0);
                }
                return 0;
            });

            return filtered;
        }

        function renderApp() {
            const container = document.getElementById('appContainer');
            container.innerHTML = '';
            const data = getFilteredIdeas();

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-zinc-500 min-h-[400px]">
                        <div class="bg-modern-surface p-8 rounded-full mb-6 border-2 border-modern-border border-dashed">
                            <i data-lucide="inbox" class="w-12 h-12 text-zinc-600"></i>
                        </div>
                        <p class="text-xl font-bold text-zinc-300">Nothing here yet!</p>
                        <p class="text-base mt-2 text-zinc-500">Type in the top bar to capture a quick idea.</p>
                    </div>`;
            } else if (state.view === 'table') {
                renderTable(container, data);
            } else {
                renderKanban(container, data);
            }
            lucide.createIcons();
        }

        // --- Table View ---
        function renderTable(container, data) {
            const wrapper = document.createElement('div');
            wrapper.className = 'bg-modern-surface border-2 border-modern-border rounded-2xl overflow-hidden shadow-xl';
            
            let rowsHtml = data.map(idea => {
                const tagStr = idea.tags.length > 0 ? idea.tags.join(', ') : '';
                return `
                <tr class="border-b border-modern-border/50 row-hover group cursor-pointer" onclick="editIdea('${idea.id}')">
                    <td class="py-4 px-6 w-40">
                        <span class="inline-block px-3 py-1 rounded-lg text-xs font-bold border ${PRIORITY_BADGES[idea.priority]} whitespace-nowrap">
                            ${idea.priority}
                        </span>
                    </td>
                    <td class="py-4 px-6">
                        <div class="flex items-center gap-3">
                            <div class="bg-modern-card p-2 rounded-lg border border-modern-border text-zinc-400">
                                <i data-lucide="${ICONS[idea.platform]}" class="w-4 h-4"></i>
                            </div>
                            <span class="font-bold text-white text-base">${idea.title}</span>
                        </div>
                    </td>
                    <td class="py-4 px-6 hidden md:table-cell text-zinc-500 text-sm truncate max-w-[200px]">${tagStr}</td>
                    <td class="py-4 px-6 w-48">
                        <span class="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-bold border ${STATUS_THEMES[idea.status]} whitespace-nowrap">
                            ${idea.status}
                        </span>
                    </td>
                    <td class="py-4 px-6 w-24 text-right">
                        <div class="row-actions opacity-0 flex justify-end gap-2" onclick="event.stopPropagation()">
                            <button onclick="deleteIdea('${idea.id}')" class="p-2 text-zinc-500 hover:text-white hover:bg-red-500 rounded-xl transition-all"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                    </td>
                </tr>`;
            }).join('');

            wrapper.innerHTML = `
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <tbody class="text-sm">
                            ${rowsHtml}
                        </tbody>
                    </table>
                </div>
            `;
            container.appendChild(wrapper);
        }

        // --- Visual Kanban View ---
        function renderKanban(container, data) {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex gap-6 overflow-x-auto pb-8 h-full items-start w-full';
            
            STATUSES.forEach(status => {
                if(state.filterStatus !== 'All' && state.filterStatus !== status) return;

                const columnIdeas = data.filter(i => i.status === status);
                const theme = STATUS_THEMES[status];
                
                const col = document.createElement('div');
                // Wider columns, distinct backgrounds for the column lane
                col.className = 'flex-shrink-0 w-[340px] flex flex-col max-h-full bg-modern-surface/30 rounded-3xl p-3 border border-modern-border border-dashed';
                
                col.innerHTML = `
                    <div class="p-3 mb-3 rounded-2xl flex justify-between items-center shrink-0 border ${theme}">
                        <div class="flex items-center gap-2">
                            <h3 class="font-bold text-sm uppercase tracking-wider">${status}</h3>
                        </div>
                        <span class="bg-black/20 text-current text-xs py-1 px-2.5 rounded-lg font-bold">${columnIdeas.length}</span>
                    </div>
                    <div class="flex-1 overflow-y-auto space-y-4 min-h-[200px] p-1 rounded-xl" 
                         ondragover="handleDragOver(event)" 
                         ondragenter="handleDragEnter(event)"
                         ondragleave="handleDragLeave(event)"
                         ondrop="handleDrop(event, '${status}')">
                    </div>
                `;

                const colContainer = col.querySelector('div.overflow-y-auto');
                if (columnIdeas.length === 0) {
                    colContainer.innerHTML = `<div class="text-zinc-600 text-sm font-semibold text-center py-10 rounded-2xl opacity-50">Drop here</div>`;
                } else {
                    columnIdeas.forEach(idea => {
                        colContainer.appendChild(createDenseKanbanCard(idea));
                    });
                }

                wrapper.appendChild(col);
            });

            container.appendChild(wrapper);
        }

        function createDenseKanbanCard(idea) {
            const card = document.createElement('div');
            // Big hit area, tactile feel
            card.className = `kanban-card bg-modern-card border-2 border-modern-border p-5 rounded-2xl relative group`;
            card.draggable = true;
            card.ondragstart = (e) => handleDragStart(e, idea.id);
            card.ondragend = handleDragEnd;
            card.onclick = () => editIdea(idea.id); // Click whole card to edit

            const hasDesc = idea.description && idea.description.trim() !== '';

            card.innerHTML = `
                <div class="flex justify-between items-start mb-3 gap-3">
                    <span class="inline-block px-2.5 py-1 rounded-md text-[10px] font-bold border ${PRIORITY_BADGES[idea.priority]} uppercase tracking-wider">
                        ${idea.priority}
                    </span>
                    <button onclick="event.stopPropagation(); deleteIdea('${idea.id}')" class="opacity-0 group-hover:opacity-100 p-1 text-zinc-500 hover:text-red-400 hover:bg-modern-surface rounded-lg transition-all absolute top-4 right-4"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
                
                <h4 class="font-bold text-white text-base leading-snug mb-3 pr-6">${idea.title}</h4>
                
                ${hasDesc ? `<div class="text-zinc-500 text-sm mb-4 line-clamp-2 bg-modern-surface p-2.5 rounded-xl border border-modern-border/50"><i data-lucide="align-left" class="w-3 h-3 inline mr-1 mb-0.5"></i> Notes attached</div>` : ''}

                <div class="flex items-center justify-between mt-auto pt-2 border-t border-modern-border/50">
                    <div class="flex items-center gap-1.5 text-zinc-400 text-xs font-bold uppercase tracking-wider bg-modern-surface px-2.5 py-1.5 rounded-lg border border-modern-border">
                        <i data-lucide="${ICONS[idea.platform]}" class="w-3.5 h-3.5"></i> ${idea.platform}
                    </div>
                    ${idea.tags.length > 0 ? `<div class="text-xs font-semibold text-zinc-500 bg-modern-surface px-2 py-1 rounded-md">#${idea.tags[0]}</div>` : ''}
                </div>
            `;
            return card;
        }

        // --- Drag & Drop (with Dopamine) ---
        function handleDragStart(e, id) { 
            e.dataTransfer.setData('text/plain', id); 
            e.target.classList.add('opacity-40', 'scale-95'); 
        }
        function handleDragEnd(e) { 
            e.target.classList.remove('opacity-40', 'scale-95'); 
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over')); 
        }
        function handleDragOver(e) { e.preventDefault(); }
        function handleDragEnter(e) { e.preventDefault(); const col = e.target.closest('div.overflow-y-auto'); if(col) col.classList.add('drag-over'); }
        function handleDragLeave(e) { const col = e.target.closest('div.overflow-y-auto'); if(col && !col.contains(e.relatedTarget)) col.classList.remove('drag-over'); }
        
        function handleDrop(e, newStatus) {
            e.preventDefault();
            const col = e.target.closest('div.overflow-y-auto');
            if(col) col.classList.remove('drag-over');
            
            const id = e.dataTransfer.getData('text/plain');
            const ideaIndex = ideas.findIndex(i => i.id === id);
            
            if (ideaIndex !== -1 && ideas[ideaIndex].status !== newStatus) {
                ideas[ideaIndex].status = newStatus;
                
                // Dopamine Check: Is it Done? Fire confetti!
                if (newStatus === 'Done 🎉') {
                    fireConfetti();
                    showToast("Awesome job! Idea completed.", "success");
                }

                saveToLocalStorage(); 
                renderSidebar(); 
                renderApp();
            }
        }

        // --- Confetti Reward System ---
        function fireConfetti() {
            const colors = ['#818cf8', '#34d399', '#f472b6', '#fbbf24', '#f87171'];
            for(let i=0; i<60; i++) {
                let conf = document.createElement('div');
                conf.className = 'confetti rounded-sm animate-fall';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-20px';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                // Randomize animation duration and delay
                conf.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
                conf.style.animationDelay = (Math.random() * 0.5) + 's';
                // Randomize size slightly
                const size = Math.random() * 6 + 6; 
                conf.style.width = size + 'px';
                conf.style.height = size + 'px';
                
                document.body.appendChild(conf);
                
                // Cleanup
                setTimeout(() => conf.remove(), 3000);
            }
        }

        // --- Modals & CRUD ---
        function openModal(id = null) {
            const modal = document.getElementById('ideaModal');
            const content = document.getElementById('modalContent');
            document.getElementById('ideaForm').reset();
            document.getElementById('ideaId').value = '';
            document.querySelector('input[name="priority"][value="⭐ Next"]').checked = true;

            if (id) {
                const idea = ideas.find(i => i.id === id);
                if (idea) {
                    document.getElementById('modalTitle').innerHTML = '<div class="bg-indigo-500 text-white p-2 rounded-xl"><i data-lucide="edit-3" class="w-5 h-5"></i></div> Edit Idea';
                    document.getElementById('ideaId').value = idea.id;
                    document.getElementById('title').value = idea.title;
                    document.getElementById('description').value = idea.description;
                    document.getElementById('platform').value = idea.platform;
                    document.getElementById('status').value = idea.status;
                    document.getElementById('tags').value = idea.tags.join(', ');
                    
                    const pRadio = document.querySelector(`input[name="priority"][value="${idea.priority}"]`);
                    if(pRadio) pRadio.checked = true;
                }
            } else {
                document.getElementById('modalTitle').innerHTML = '<div class="bg-indigo-500 text-white p-2 rounded-xl"><i data-lucide="zap" class="w-5 h-5"></i></div> Idea Details';
                if(state.filterPlatform !== 'All') document.getElementById('platform').value = state.filterPlatform;
                if(state.filterStatus !== 'All') document.getElementById('status').value = state.filterStatus;
            }

            lucide.createIcons();
            modal.classList.remove('hidden');
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');
            content.classList.remove('scale-95', 'opacity-0');
            
            // Auto focus title for quick typing
            setTimeout(() => document.getElementById('title').focus(), 100);
        }

        function closeModal() {
            const modal = document.getElementById('ideaModal');
            const content = document.getElementById('modalContent');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        function saveIdea(e) {
            e.preventDefault();
            const id = document.getElementById('ideaId').value;
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const platform = document.getElementById('platform').value;
            const status = document.getElementById('status').value;
            const priority = document.querySelector('input[name="priority"]:checked').value;
            const tags = document.getElementById('tags').value.split(',').map(t => t.trim()).filter(t => t !== '');

            if (id) {
                const index = ideas.findIndex(i => i.id === id);
                if (index !== -1) {
                    const wasDone = ideas[index].status === 'Done 🎉';
                    ideas[index] = { ...ideas[index], title, description, platform, status, priority, tags };
                    if (!wasDone && status === 'Done 🎉') fireConfetti(); // Fire if changed to done from edit
                }
                showToast('Changes saved! 💾');
            } else {
                ideas.unshift({ id: Date.now().toString(), title, description, platform, status, priority, tags, createdAt: new Date().toISOString() });
                showToast('Idea added to the pile! 🚀');
            }
            
            saveToLocalStorage();
            closeModal();
            renderSidebar();
            renderApp();
        }

        function deleteIdea(id) {
            if(confirm("Are you sure you want to delete this idea?")) {
                ideas = ideas.filter(i => i.id !== id);
                saveToLocalStorage();
                renderSidebar();
                renderApp();
                showToast('Idea deleted', 'error');
            }
        }

        function editIdea(id) { openModal(id); }

        // --- File I/O ---
        function exportData() {
            const blob = new Blob([JSON.stringify(ideas, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `creator_ideas_${new Date().toISOString().split('T')[0]}.json`;
            a.click(); URL.revokeObjectURL(url);
            showToast('Backup saved!');
        }

        function importData(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) { 
                        ideas = data; 
                        saveToLocalStorage();
                        renderSidebar(); 
                        renderApp(); 
                        showToast('Ideas restored successfully!'); 
                    } else showToast('Invalid file format', 'error');
                } catch { showToast('Error parsing file', 'error'); }
            };
            reader.readAsText(file);
            e.target.value = '';
        }

        // --- Utils ---
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = message;
            
            if (type === 'error') {
                document.getElementById('toastIconWrapper').className = 'bg-red-500 text-white p-1.5 rounded-full';
                document.getElementById('toastIconWrapper').innerHTML = `<i data-lucide="alert-triangle" class="w-4 h-4"></i>`;
            } else {
                document.getElementById('toastIconWrapper').className = 'bg-indigo-500 text-white p-1.5 rounded-full';
                document.getElementById('toastIconWrapper').innerHTML = `<i data-lucide="check" class="w-4 h-4"></i>`;
            }
            
            toast.className = `fixed bottom-8 right-8 transform translate-y-0 opacity-100 transition-all duration-300 bg-modern-surface border-2 border-modern-border text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4 z-[70] text-base font-bold backdrop-blur-md`;
            lucide.createIcons();
            setTimeout(() => { toast.classList.replace('translate-y-0', 'translate-y-24'); toast.classList.replace('opacity-100', 'opacity-0'); }, 3000);
        }

        document.getElementById('ideaModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
    </script>
</body>
</html>
